# Example YAML configuration for a synthetic benchmark experiment
experiment_name: test_synthetic_experiment

# Monitors configuration
monitors:
  - identifier: TimelyMon
    name: TimelyMon 1
    branch: development
    params:
      worker: 1
      output_mode: 1
  - identifier: TimelyMon
    name: TimelyMon 6
    branch: development
    params:
      worker: 6
      output_mode: 1
  - identifier: MonPoly
    name: MonPoly
    branch: master
    params:
      replayer: gen_data
  - identifier: VeriMon
    name: VeriMon
    branch: master
    params:
      replayer: gen_data
      verified: true
  - identifier: WhyMon
    name: WhyMon
    branch: main
    release: branch
    params:
      replayer: gen_data

# Oracles configuration (optional)
oracles:
  - identifier: VeriMonOracle
    name: VeriMonOracle
    monitor_name: VeriMon
    params:
      replayer: gen_data
      verified: true

runtime_constraints:
  upper_bound = 200

# Data setup - Hydra structured format
data_setup:
  type: SignatureContract
  SignatureContract:
    trace_length: 1000
    event_rate: 1000

# Policy setup
policy_setup:
  type: MfotlPolicyContract
  MfotlPolicyContract:
    num_preds: 4
    prob_eand: 0
    prob_rand: 0
    prob_let: 0
    prob_matchF: 0
    prob_matchP: 0

synthetic_config:
  experiment:
    num_operators: [5]
    num_fvs: [2]
    num_setting: [0, 1]
    num_data_set_sizes: [50]

tools_to_build:
  - TimelyMon 1
  - TimelyMon 6
  - VeriMon
  - MonPoly
  - WhyMon

oracle:
  enabled: true
  name: VeriMonOracle

seeds:
  '[5, 2, 0]': [314159265,87006]
  '[5, 2, 1]': [314159265,53339]