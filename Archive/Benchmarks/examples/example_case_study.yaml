# Example YAML configuration for a case study benchmark experiment
experiment_name: Nokia_case_study

# Monitors configuration
monitors:
  - identifier: TimelyMon
    name: TimelyMon 1
    branch: development
    params:
      worker: 1
      output_mode: 1
  - identifier: MonPoly
    name: MonPoly
    branch: master
    params:
      replayer: gen_data

# Time guard configuration
runtime_constraints:
  upper_bound: 300

# Case study specific configuration
data_setup:
    type: CaseStudy
    name: Nokia


# Tools to build and run
tools_to_build:
  - TimelyMon 1
  - MonPoly

