experiment_name: online_script_experiment
runtime_setting: online

OnlineExperimentContractGeneral:
  data_source_type: script
  timestamp_unit: seconds
  mode: accelerated
  accumulative_time: 1

monitors:
  - identifier: WhyMon
    name: WhyMon
    branch: main
    release: release
    params:
      OnlineExperimentContractTool:
        format: log
        response_mode: current-timepoint
        output_collection_mode: before-delimiter

tools_to_build:
  - WhyMon

data_setup:
  type: script
  name: TestScript
  script_name: TestScriptLOG.py