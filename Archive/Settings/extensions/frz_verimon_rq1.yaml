experiment_name: frz_verimon

monitors:
  - identifier: VeriMon
    name: VeriMon-correct
    branch: freeze
  - identifier: VeriMon
    name: VeriMon-const-rel
    commit: 76fd7ecdfe9eb3de63a3e1d6cc5815f8b00034ce
    branch: const-relation-propagation
  - identifier: VeriMon
    name: VeriMon-caching
    commit: 69dcbdb788b879cfb0c9db7b9d153be56dfe3bdb
    branch: const-relation-propagation
  - identifier: MonPoly
    name: MonPoly-frz
    commit: 28c82c68e9ba5b6a1a92b460fd8c0b9c9c82cc02
    branch: freeze-native
    params:
      nofilteremptytp: true

oracles:
  - identifier: VeriMonOracle
    name: VeriMonOracle
    monitor_name: VeriMon-correct

oracle:
  enabled: true
  name: VeriMonOracle

runtime_constraints:
  upper_bound: 30

data_setup:
  type: SignatureContract
  SignatureContract:
    trace_length: 1000
    event_rate: 10

policy_setup:
  type: ImmediatePolicyContract
  ImmediatePolicyContract:
    format: MFOTL
    delimiter: ;
    frz_simple:         "a(x:int) b(x:int); FRZ q(x) = a(x) IN q(x)"


synthetic_config:
  data_source: SignatureGenerator
  policy_source: GenFmaGenerator
  experiment:
    num_data_set_sizes: [1000, 2000, 4000, 8000, 10000]

tools_to_build:
  - VeriMon-correct
  - VeriMon-const-rel
  - VeriMon-caching
  - MonPoly-frz
