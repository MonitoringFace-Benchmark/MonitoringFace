experiment_name: online_timelymon_nokia_experiment
runtime_setting: online

OnlineExperimentContractGeneral:
  data_source_type: file
  mode: accelerated
  accumulative_time: 120

monitors:
  - identifier: TimelyMon
    name: TimelyMon
    branch: development
    params:
      worker: 1
      output_mode: 1
      OnlineExperimentContractTool:
        format: csv
        response_mode: event-count
        input_aggregations: 1
        output_collection_mode: before-delimiter
        input_aggregation_pattern: ">W"

tools_to_build:
  - TimelyMon

data_setup:
  type: CaseStudy
  name: NokiaCsvOnline